name: Vigilancia Legaltech

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Todos los días a las 07:00 UTC (09:00 AM hora española)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: pip install -r requirements.txt

      - name: Ejecutar el rastreador con IA
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python recolector.py

      - name: Guardar la memoria y el boletín en el repositorio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Guardamos toda la carpeta de estados y la web generada
          git add estado/ docs/
          # Solo hace commit si encuentra cambios reales, evitando que el flujo falle
          git diff --staged --quiet || git commit -m "Actualización automática: boletín y estado de memoria"
          git push

      - name: Preparar la web para publicar
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Publicar Dashboard en GitHub Pages
        uses: actions/deploy-pages@v4